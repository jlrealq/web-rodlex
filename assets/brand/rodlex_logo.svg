<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Iconic Column Icon -->
  <g id="column-icon">
    <!-- Capital -->
    <path d="M20 30 Q20 25 25 25 L55 25 Q60 25 60 30 L60 35 L20 35 Z" fill="#C9A84C" />
    <circle cx="22" cy="30" r="4" fill="none" stroke="#C9A84C" stroke-width="2" />
    <circle cx="58" cy="30" r="4" fill="none" stroke="#C9A84C" stroke-width="2" />
    
    <!-- Shaft with Flutes -->
    <rect x="25" y="35" width="30" height="40" fill="#FFFFFF" />
    <rect x="30" y="38" width="2" height="34" fill="#122040" rx="1" />
    <rect x="39" y="38" width="2" height="34" fill="#122040" rx="1" />
    <rect x="48" y="38" width="2" height="34" fill="#122040" rx="1" />
    
    <!-- Base / Pedestal -->
    <rect x="20" y="75" width="40" height="5" fill="#C9A84C" />
    <rect x="15" y="80" width="50" height="8" fill="#C9A84C" />
  </g>
  
  <!-- Typography -->
  <g id="typography">
    <text x="80" y="55" font-family="'Playfair Display', serif" font-size="36" font-weight="900" fill="#FFFFFF">RodLex</text>
    <text x="80" y="85" font-family="'Inter', sans-serif" font-size="16" font-weight="600" letter-spacing="1" fill="#FFFFFF">
      <tspan fill="#C9A84C">&amp;</tspan> ASOCIADOS
    </text>
  </g>
</svg>
